<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N12menos | Hub Editorial</title>
    <style>
        /* Estética minimalista inspirada en Handshake Books */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #111;
            max-width: 650px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #fff;
        }
        header {
            border-bottom: 2px solid #000;
            margin-bottom: 40px;
            padding-bottom: 20px;
        }
        h1 { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .seccion-titulo { font-size: 0.9rem; font-weight: 700; color: #666; text-transform: uppercase; margin-top: 40px; }
        
        /* Lista de ediciones */
        .lista-ediciones { list-style: none; padding: 0; }
        .edicion-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .edicion-item a { color: #000; text-decoration: none; font-weight: 500; }
        .edicion-item a:hover { text-decoration: underline; }
        .edicion-meta { font-family: monospace; font-size: 0.8rem; color: #888; }
        
        footer { margin-top: 80px; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

    <header>
        <h1>N12menos / Gestión Editorial</h1>
    </header>

    <div class="seccion-titulo">Ediciones Publicadas</div>
    <ul class="lista-ediciones">
        <li class="edicion-item">
            <a href="#">001_Titulo_de_Prueba</a>
            <span class="edicion-meta">2024 / PDF</span>
        </li>
    </ul>

    <footer>
        © N12menos - Hub de gestión actualizado desde GitHub.
    </footer>

</body>
</html>
